<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design</title>
    <style>
        .bar {
            display: flex;
            justify-content: center;
            height: 100vh;
            margin: 0;
            width: 646px;
            height: 63px;
            background: #ffffff;
            border-radius: 27px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
        }
        .bar .treegfx {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 400;
            font-size: 24px;
            color: #939393;
        }
        .bar .projects {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 400;
            font-size: 24px;
            color: #939393;
        }

        .container .projects {
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="bar">
        <div class="treegfx">@treegfx</div>
        <div class="projects">projects</div>
    </div>
</body>
</html>
